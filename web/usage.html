<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usage · Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <script src="/admin/vendor/tailwindcss-browser/index.global.js"></script>
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <style>
    body { background: #0b0f1a; color: #e5e7eb; font-family: ui-sans-serif, system-ui, sans-serif; }
    .card { background: #131a2b; border: 1px solid #1f2a44; border-radius: 14px; }
    .stat { background: #0f1524; border: 1px solid #1c2740; border-radius: 12px; }
    .bar-track { background: #1c2740; border-radius: 999px; overflow: hidden; }
    .bar-fill { background: linear-gradient(90deg,#3b82f6,#8b5cf6); height: 100%; }
    input, button { outline: none; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 8px 10px; text-align: left; font-size: 12px; white-space: nowrap; }
    thead th { color: #93a4c3; border-bottom: 1px solid #1f2a44; font-weight: 600; }
    tbody tr { border-bottom: 1px solid #141d33; }
    .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .ok { background: rgba(34,197,94,.15); color: #4ade80; }
    .bad { background: rgba(239,68,68,.15); color: #f87171; }
  </style>
</head>

<body class="min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="flex items-start justify-between gap-3 mb-6">
      <div>
        <h1 class="text-2xl font-bold mb-1"><i class="fa-solid fa-chart-line text-blue-400"></i>
          <span data-i18n="usage.pageTitle">Usage Dashboard</span></h1>
        <p class="text-sm text-slate-400" data-i18n="usage.pageSubtitle">Enter your API key to view its usage statistics.</p>
      </div>
      <div id="langBtns" class="shrink-0 inline-flex rounded-lg overflow-hidden border border-[#1f2a44]">
        <button type="button" data-lang="en"
          class="text-xs font-semibold px-3 py-2 text-slate-300 hover:bg-slate-700">EN</button>
        <button type="button" data-lang="vi"
          class="text-xs font-semibold px-3 py-2 text-slate-300 hover:bg-slate-700 border-l border-[#1f2a44]">VI</button>
        <button type="button" data-lang="zh"
          class="text-xs font-semibold px-3 py-2 text-slate-300 hover:bg-slate-700 border-l border-[#1f2a44]">中文</button>
      </div>
    </div>

    <div class="card p-4 mb-6">
      <div class="flex gap-3 items-center">
        <div class="relative flex-1">
          <input id="keyInput" type="password" placeholder="sk-..." data-i18n-ph="usage.keyPlaceholder"
            class="w-full bg-[#0f1524] border border-[#1f2a44] rounded-lg pl-3 pr-10 py-2 text-sm text-slate-100" />
          <button id="toggleKeyBtn" type="button" title="Show/hide key"
            class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-200">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <button id="checkBtn"
          class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold px-5 py-2 rounded-lg">
          <i class="fa-solid fa-magnifying-glass"></i> Check
        </button>
        <button id="clearKeyBtn" title="Remove saved key"
          class="hidden bg-slate-700 hover:bg-red-600 text-white text-sm font-semibold px-4 py-2 rounded-lg">
          <i class="fa-solid fa-trash"></i> <span data-i18n="usage.clearKey">Remove</span>
        </button>
      </div>
      <label class="flex items-center gap-2 mt-3 text-xs text-slate-400 cursor-pointer select-none">
        <input id="rememberKey" type="checkbox"
          class="w-4 h-4 rounded border-[#1f2a44] bg-[#0f1524] accent-blue-600 cursor-pointer" />
        <span data-i18n="usage.rememberKey">Remember this key on this device</span>
      </label>
    </div>

    <div id="errBox" class="hidden card p-4 mb-6 border-red-500/40 text-red-300 text-sm"></div>

    <div id="dashboard" class="hidden space-y-6"></div>
  </div>

  <script>document.write('<scr'+'ipt src="/admin/usage.js?v=' + Date.now() + '"></scr'+'ipt>');</script>
</body>

</html>

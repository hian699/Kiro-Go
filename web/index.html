<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <script src="/admin/vendor/tailwindcss-browser/index.global.js"></script>
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/admin/styles.css" id="__cssAsset" />
  <link rel="stylesheet" href="/admin/toast.css" id="__toastCss" />
  <script>
    (function () {
      var v = Date.now();
      window.__v = v;
      var css = document.getElementById('__cssAsset');
      if (css) css.href = '/admin/styles.css?v=' + v;
      var tcss = document.getElementById('__toastCss');
      if (tcss) tcss.href = '/admin/toast.css?v=' + v;
    })();
  </script>
</head>

<body>
  <!-- Login -->
  <div id="loginPage" class="login-wrapper">
    <div class="ghost-bg" aria-hidden="true">
      <i class="fa-solid fa-ghost ghost ghost-1"></i>
      <i class="fa-solid fa-ghost ghost ghost-2"></i>
      <i class="fa-solid fa-ghost ghost ghost-3"></i>
      <i class="fa-solid fa-ghost ghost ghost-4"></i>
      <i class="fa-solid fa-ghost ghost ghost-5"></i>
      <i class="fa-solid fa-ghost ghost ghost-6"></i>
      <i class="fa-solid fa-ghost ghost ghost-7"></i>
      <i class="fa-solid fa-ghost ghost ghost-8"></i>
      <i class="fa-solid fa-ghost ghost ghost-9"></i>
      <i class="fa-solid fa-ghost ghost ghost-10"></i>
      <i class="fa-solid fa-ghost ghost ghost-11"></i>
      <i class="fa-solid fa-ghost ghost ghost-12"></i>
    </div>
    <header class="login-topbar">
      <div class="login-topbar-inner">
        <div class="brand" aria-label="Kiro-Go" data-i18n-aria-label="app.title">
          <img class="brand-icon" src="/admin/favicon.ico" alt="" />
          <span class="brand-text">Kiro-Go</span>
        </div>
        <div class="topbar-actions">
          <div class="lang-switch" id="loginLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
            <button class="lang-btn" data-lang="vi" type="button" data-i18n="lang.vi"></button>
          </div>
          <span class="divider" aria-hidden="true"></span>
          <button id="loginThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
        </div>
      </div>
    </header>
    <main class="login-main">
      <div class="login-box">
        <h1 class="login-title" data-i18n="login.title"></h1>
        <p class="login-subtitle" data-i18n="login.subtitle"></p>
        <div class="form-group">
          <label data-i18n="login.password"></label>
          <div class="input-affix">
            <i class="fa-solid fa-lock affix-icon"></i>
            <input type="password" id="pwdField" data-i18n-placeholder="login.passwordPlaceholder" autocomplete="off" />
            <button type="button" class="affix-btn" id="pwdToggle" aria-label=""
              data-i18n-aria-label="login.showPassword" data-shown="false">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>
        <label class="remember-row" for="rememberPwd">
          <input type="checkbox" id="rememberPwd" />
          <span class="remember-box" aria-hidden="true"><i class="fa-solid fa-check"></i></span>
          <span class="remember-label" data-i18n="login.remember"></span>
        </label>
        <button type="button" class="btn btn-primary btn-lg w-full" id="loginBtn">
          <i class="fa-solid fa-arrow-right-to-bracket"></i>
          <span data-i18n="login.submit"></span>
        </button>

      </div>
    </main>
  </div>

  <!-- Main app -->
  <div id="mainPage" class="hidden">
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand-wrap">
          <div class="brand">
            <img class="brand-icon" src="/admin/favicon.ico" alt="" />
            <span class="brand-text">Kiro-Go</span>
          </div>
        </div>
        <nav class="header-nav" aria-label="" data-i18n-aria-label="aria.sections">
          <div class="tabs" id="tabBar">
            <button type="button" class="tab active" data-tab="accounts"><i class="fa-solid fa-users tab-icon"></i><span
                data-i18n="tabs.accounts"></span></button>
            <button type="button" class="tab" data-tab="settings"><i class="fa-solid fa-sliders tab-icon"></i><span
                data-i18n="tabs.settings"></span></button>
            <button type="button" class="tab" data-tab="api"><i class="fa-solid fa-plug tab-icon"></i><span
                data-i18n="tabs.api"></span></button>
            <button type="button" class="tab" data-tab="apilog"><i class="fa-solid fa-list-ul tab-icon"></i><span
                data-i18n="tabs.apilog"></span></button>
            <button type="button" class="tab" data-tab="console"><i class="fa-solid fa-terminal tab-icon"></i><span
                data-i18n="tabs.console"></span></button>
          </div>
        </nav>
        <div class="topbar-actions justify-end">
          <div class="lang-switch" id="mainLangSwitch" role="group" aria-label="" data-i18n-aria-label="lang.label">
            <button class="lang-btn" data-lang="zh" type="button" data-i18n="lang.zh"></button>
            <button class="lang-btn" data-lang="en" type="button" data-i18n="lang.en"></button>
            <button class="lang-btn" data-lang="vi" type="button" data-i18n="lang.vi"></button>
          </div>
          <button id="mainThemeToggle" class="icon-btn theme-toggle" type="button" aria-label=""
            data-i18n-title="theme.toggle" data-i18n-aria-label="theme.toggle" data-theme="system">
            <i class="fa-solid fa-circle-half-stroke theme-ico-system"></i>
            <i class="fa-solid fa-sun theme-ico-light"></i>
            <i class="fa-solid fa-moon theme-ico-dark"></i>
          </button>
          <span class="divider" aria-hidden="true"></span>
          <button class="btn btn-outline btn-sm" id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span data-i18n="common.logout"></span>
          </button>
        </div>
      </div>
    </header>

    <div class="container">
      <!-- Stats summary -->
      <div class="stats-grid" id="tabOverviewStats">
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.accounts"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statAccounts">0</div>
              <div class="stat-sub">
                <span class="stat-sub-sec"><span class="stat-value-sm" id="statCredits">0</span> <span
                    class="stat-label" data-i18n="stats.credits"></span></span>
              </div>
            </div>
            <i class="fa-solid fa-users stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.requests"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statRequests">0</div>
              <div class="stat-sub">
                <span class="stat-sub-sec"><span class="stat-value-sm" id="statTokens">0</span> <span class="stat-label"
                    data-i18n="stats.tokens"></span></span>
              </div>
            </div>
            <i class="fa-solid fa-route stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.success"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value" id="statSuccess">0</div>
              <div class="stat-sub"><span class="stat-label" data-i18n="stats.completed"></span></div>
            </div>
            <i class="fa-solid fa-circle-check stat-icon" aria-hidden="true"></i>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card-title" data-i18n="stats.failed"></div>
          <div class="stat-body">
            <div class="stat-main">
              <div class="stat-value stat-value--danger" id="statFailed">0</div>
              <div class="stat-sub">
                <span class="stat-label" data-i18n="stats.errors"></span>
              </div>
            </div>
            <i class="fa-solid fa-circle-xmark stat-icon stat-icon--danger" aria-hidden="true"></i>
          </div>
        </div>
      </div>

      <!-- Accounts tab -->
      <div id="tabAccounts" class="tab-content">
        <div class="card">
          <div class="card-header">
            <span class="card-title" data-i18n="accounts.title"></span>
            <div class="card-actions">
              <label class="flex items-center gap-2 cursor-pointer select-none" title=""
                data-i18n-title="privacy.tooltip">
                <span class="text-xs font-medium" data-i18n="privacy.label"></span>
                <span class="switch"><input type="checkbox" id="privacyModeToggle" checked /><span
                    class="slider"></span></span>
              </label>
              <button class="btn btn-outline btn-sm" id="exportBtn"><i class="fa-solid fa-file-export"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.export"></span></button>
              <button class="btn btn-outline btn-sm" id="refreshAllModelsBtn"><i class="fa-solid fa-arrows-rotate"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="models.refreshAll"></span></button>
              <button class="btn btn-primary btn-sm" id="addAccountBtn"><i class="fa-solid fa-plus"
                  aria-hidden="true"></i><span class="btn-text" data-i18n="accounts.add"></span></button>
            </div>
          </div>

          <div class="toolbar">
            <label class="flex items-center gap-1.5 cursor-pointer select-none shrink-0">
              <input type="checkbox" id="selectAllCheckbox" />
              <span class="text-xs" data-i18n="batch.selectAll"></span>
            </label>
            <div id="batchBar" class="batch-bar hidden">
              <span id="batchCount" class="batch-count"></span>
              <button class="btn btn-primary btn-xs" data-batch="enable" data-i18n="batch.enable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="disable" data-i18n="batch.disable"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refresh" data-i18n="batch.refresh"></button>
              <button class="btn btn-secondary btn-xs" data-batch="refreshModels"
                data-i18n="batch.refreshModels"></button>
              <button class="btn btn-danger btn-xs" data-batch="delete" data-i18n="batch.delete"></button>
            </div>
            <div class="toolbar-spacer"></div>
            <input type="text" id="filterSearch" class="w-56!" data-i18n-placeholder="filter.search" />
            <select id="filterStatusSelect" class="w-32!" data-i18n-aria-label="filter.status">
              <option value="all" data-i18n="filter.all"></option>
              <option value="enabled" data-i18n="filter.enabled"></option>
              <option value="disabled" data-i18n="filter.disabled"></option>
              <option value="banned" data-i18n="filter.banned"></option>
            </select>
          </div>

          <div id="accountsList"></div>
        </div>
      </div>

      <!-- Settings tab -->
      <div id="tabSettings" class="tab-content hidden">
        <aside class="settings-rail" aria-label="Settings sections">
          <a href="#settings-api"><i class="fa-solid fa-key" aria-hidden="true"></i><span data-i18n="settings.apiSettings"></span></a>
          <a href="#settings-usage"><i class="fa-solid fa-gauge-high" aria-hidden="true"></i><span data-i18n="settings.usageSettings"></span></a>
          <a href="#settings-thinking"><i class="fa-solid fa-brain" aria-hidden="true"></i><span data-i18n="settings.thinkingSettings"></span></a>
          <a href="#settings-endpoint"><i class="fa-solid fa-route" aria-hidden="true"></i><span data-i18n="settings.endpointSettings"></span></a>
          <a href="#settings-security"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i><span data-i18n="settings.adminPassword"></span></a>
          <a href="#settings-branding"><i class="fa-solid fa-palette" aria-hidden="true"></i><span data-i18n="settings.branding"></span></a>
          <a href="#settings-proxy"><i class="fa-solid fa-network-wired" aria-hidden="true"></i><span data-i18n="settings.proxySettings"></span></a>
          <a href="#settings-filter"><i class="fa-solid fa-filter" aria-hidden="true"></i><span data-i18n="settings.promptFilter"></span></a>
          <a href="#settings-stats"><i class="fa-solid fa-rotate-left" aria-hidden="true"></i><span data-i18n="settings.statistics"></span></a>
        </aside>
        <div class="settings-stack">
        <!-- API settings -->
        <div class="card settings-card settings-card-wide settings-card-api" id="settings-api">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-key" aria-hidden="true"></i><span data-i18n="settings.apiSettings"></span></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="requireApiKey" /><span class="slider"></span></span>
              <span data-i18n="settings.enableApiKey"></span>
            </label>
            <small data-i18n="apiKeys.requireHint"></small>
          </div>
          <button class="btn btn-primary btn-sm" id="saveRequireApiKeyBtn" data-i18n="settings.saveApiKey"></button>

          <div class="form-group" style="margin-top: 1rem;">
            <div class="flex items-center gap-2" style="justify-content: space-between;flex-wrap:wrap;">
              <label class="font-semibold" data-i18n="apiKeys.listTitle"></label>
              <div class="flex items-center gap-2" style="flex-wrap:wrap;">
                <button class="btn btn-outline btn-sm" id="exportApiKeysBtn" type="button">
                  <i class="fa-solid fa-file-export"></i>
                  <span data-i18n="apiKeys.export.button"></span>
                </button>
                <button class="btn btn-outline btn-sm" id="importApiKeysBtn" type="button">
                  <i class="fa-solid fa-file-import"></i>
                  <span data-i18n="apiKeys.import.button"></span>
                </button>
                <button class="btn btn-outline btn-sm" id="bulkAddApiKeyBtn" type="button">
                  <i class="fa-solid fa-layer-group"></i>
                  <span data-i18n="apiKeys.bulkAdd"></span>
                </button>
                <button class="btn btn-outline btn-sm" id="addApiKeyBtn" type="button">
                  <i class="fa-solid fa-plus"></i>
                  <span data-i18n="apiKeys.add"></span>
                </button>
              </div>
            </div>
            <small data-i18n="apiKeys.listHint"></small>
          </div>
          <div class="usage-totals" id="apiKeyStats"></div>
          <div id="apiKeyBulkBar" class="batch-bar hidden" style="margin:0.75rem 0;">
            <span id="apiKeyBulkCount" class="batch-count"></span>
            <button class="btn btn-danger btn-xs" id="bulkDeleteApiKeyBtn" type="button" data-i18n="apiKeys.bulkDelete"></button>
          </div>
          <div id="apiKeysList"></div>
        </div>

        <!-- Usage settings -->
        <div class="card settings-card settings-card-compact settings-card-usage" id="settings-usage">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-gauge-high" aria-hidden="true"></i><span data-i18n="settings.usageSettings"></span></span></div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="allowOverUsage" /><span class="slider"></span></span>
              <span data-i18n="settings.allowOverUsage"></span>
            </label>
            <small data-i18n="settings.allowOverUsageHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.maxPayload"></label>
            <select id="maxPayloadBytes">
              <option value="921600" data-i18n="settings.maxPayloadConservative"></option>
              <option value="2000000" data-i18n="settings.maxPayloadBalanced"></option>
              <option value="2100000" data-i18n="settings.maxPayloadAggressive"></option>
              <option value="4000000" data-i18n="settings.maxPayloadMax"></option>
            </select>
            <small data-i18n="settings.maxPayloadHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.stickyTtl"></label>
            <select id="stickyPinTtl">
              <option value="300" data-i18n="settings.stickyTtl5m"></option>
              <option value="900" data-i18n="settings.stickyTtl15m"></option>
              <option value="1800" data-i18n="settings.stickyTtl30m"></option>
              <option value="3600" data-i18n="settings.stickyTtl60m"></option>
            </select>
            <small data-i18n="settings.stickyTtlHint"></small>
          </div>
          <button class="btn btn-primary" id="saveOverUsageBtn" data-i18n="settings.saveUsage"></button>
        </div>

        <!-- Thinking settings -->
        <div class="card settings-card settings-card-compact settings-card-thinking" id="settings-thinking">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-brain" aria-hidden="true"></i><span data-i18n="settings.thinkingSettings"></span></span></div>
          <div class="form-group">
            <label data-i18n="settings.thinkingSuffix"></label>
            <input type="text" id="thinkingSuffix" placeholder="-thinking" />
            <small data-i18n="settings.thinkingSuffixHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.openaiFormat"></label>
            <select id="openaiThinkingFormat">
              <option value="reasoning_content" data-i18n="settings.formatReasoningContent"></option>
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <div class="form-group">
            <label data-i18n="settings.claudeFormat"></label>
            <select id="claudeThinkingFormat">
              <option value="thinking" data-i18n="settings.formatThinkingClaude"></option>
              <option value="think" data-i18n="settings.formatThinkOpenAI"></option>
            </select>
          </div>
          <button class="btn btn-primary" id="saveThinkingBtn" data-i18n="settings.saveThinking"></button>
        </div>

        <!-- Endpoint settings -->
        <div class="card settings-card settings-card-compact settings-card-endpoint" id="settings-endpoint">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-route" aria-hidden="true"></i><span data-i18n="settings.endpointSettings"></span></span></div>
          <div class="form-group">
            <label data-i18n="settings.preferredEndpoint"></label>
            <select id="preferredEndpoint">
              <option value="auto" data-i18n="settings.endpointAuto"></option>
              <option value="kiro" data-i18n="settings.endpointKiro"></option>
              <option value="codewhisperer" data-i18n="settings.endpointCodeWhisperer"></option>
              <option value="amazonq" data-i18n="settings.endpointAmazonQ"></option>
            </select>
            <small data-i18n="settings.endpointHint"></small>
          </div>
          <div class="form-group">
            <label class="flex items-center gap-2">
              <span class="switch"><input type="checkbox" id="endpointFallback" checked /><span
                  class="slider"></span></span>
              <span data-i18n="settings.endpointFallback"></span>
            </label>
            <small data-i18n="settings.endpointFallbackHint"></small>
          </div>
          <button class="btn btn-primary" id="saveEndpointBtn" data-i18n="settings.saveEndpoint"></button>
        </div>

        <!-- Admin password -->
        <div class="card settings-card settings-card-side settings-card-security" id="settings-security">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-shield-halved" aria-hidden="true"></i><span data-i18n="settings.adminPassword"></span></span></div>
          <div class="form-group">
            <label data-i18n="settings.newPassword"></label>
            <input type="password" id="newPassword" data-i18n-placeholder="settings.newPasswordPlaceholder" />
          </div>
          <button class="btn btn-primary" id="changePasswordBtn" data-i18n="settings.changePassword"></button>
        </div>

        <div class="card settings-card settings-card-side settings-card-branding" id="settings-branding">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-palette" aria-hidden="true"></i><span data-i18n="settings.branding"></span></span></div>
          <div class="form-group">
            <label data-i18n="settings.siteName"></label>
            <input type="text" id="siteName" placeholder="Kiro-Go" autocomplete="off" />
            <small data-i18n="settings.siteNameHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.expiredMessage"></label>
            <input type="text" id="expiredMessage" autocomplete="off" />
            <small data-i18n="settings.expiredMessageHint"></small>
          </div>
          <div class="form-group">
            <label data-i18n="settings.quotaMessage"></label>
            <input type="text" id="quotaMessage" autocomplete="off" />
            <small data-i18n="settings.quotaMessageHint"></small>
            <button class="btn btn-primary btn-sm" id="saveBrandingBtn" style="margin-top:0.5rem;"
              data-i18n="settings.saveBranding"></button>
          </div>
        </div>

        <!-- Proxy (pool + import + fallback, merged) -->
        <div class="card settings-card settings-card-wide settings-card-proxy" id="settings-proxy">
          <div class="card-header settings-card-header"><span class="card-title settings-card-title"><i class="fa-solid fa-network-wired" aria-hidden="true"></i><span data-i18n="settings.proxySettings"></span></span></div>
          <div class="form-group">
            <label data-i18n="settings.publicBaseURL"></label>
            <input type="text" id="publicBaseURL" placeholder="https://azr.hian.software" autocomplete="off" />
            <small data-i18n="settings.publicBaseURLHint"></small>
            <button class="btn btn-primary btn-sm" id="savePublicBaseURLBtn" style="margin-top:0.5rem;"
              data-i18n="settings.savePublicBaseURL"></button>
          </div>
          <div class="form-group">
            <label data-i18n="settings.apiBaseURL"></label>
            <input type="text" id="apiBaseURL" placeholder="https://api.example.com" autocomplete="off" />
            <small data-i18n="settings.apiBaseURLHint"></small>
            <button class="btn btn-primary btn-sm" id="saveApiBaseURLBtn" style="margin-top:0.5rem;"
              data-i18n="settings.saveApiBaseURL"></button>
          </div>

          <label class="flex items-center gap-2" style="margin-top:0.25rem;">
            <input type="checkbox" id="requireProxyToggle" />
            <span data-i18n="settings.requireProxy"></span>
          </label>
          <p class="help-block" data-i18n="settings.requireProxyHint"></p>

          <!-- Pool: add/import + list -->
          <label class="font-semibold pb-2 block" data-i18n="settings.proxyPool"></label>
          <div class="form-group">
            <textarea id="proxyImportList" class="font-mono" rows="4"
              data-i18n-placeholder="proxyImport.listPlaceholder"></textarea>
            <p class="help-block" data-i18n="proxyImport.formatHint"></p>
            <div class="proxy-add-row">
              <select id="proxyImportTarget">
                <option value="pool" data-i18n="proxyImport.targetPool"></option>
                <option value="accounts" data-i18n="proxyImport.targetAccounts"></option>
              </select>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="proxyImportAutoTest" checked />
                <span data-i18n="proxyImport.autoTest"></span>
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="proxyImportDryRun" />
                <span data-i18n="proxyImport.dryRun"></span>
              </label>
              <button class="btn btn-primary btn-sm" id="proxyImportBtn" data-i18n="proxyImport.import"></button>
            </div>
          </div>

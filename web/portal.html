<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Key — Kiro-Go</title>
  <link rel="icon" type="image/x-icon" href="/admin/favicon.ico" />
  <link rel="stylesheet" href="/admin/vendor/fontawesome/css/all.min.css" />
  <link rel="stylesheet" href="/admin/styles.css" id="__cssAsset" />
  <link rel="stylesheet" href="/admin/toast.css" id="__toastCss" />
  <script>
    (function () {
      var v = Date.now();
      var css = document.getElementById('__cssAsset');
      if (css) css.href = '/admin/styles.css?v=' + v;
      var tcss = document.getElementById('__toastCss');
      if (tcss) tcss.href = '/admin/toast.css?v=' + v;
      // Resolve theme before first paint to avoid a flash.
      try {
        var pref = localStorage.getItem('kiro_theme') || 'system';
        var mq = window.matchMedia('(prefers-color-scheme: dark)');
        var dark = pref === 'dark' || (pref === 'system' && mq.matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) { }
    })();
  </script>
  <style>
    /* ============================================================
       Kiro-Go self-service portal — the "credit ledger".
       Identity: a printed usage receipt. The remaining balance is
       the hero; the ledger of spends is the signature. Reuses the
       admin design tokens (Geist / Geist Mono, flat, light + dark).
       Self-contained: no dependency on app.js.
       ============================================================ */

    .portal, .portal *, .portal *::before, .portal *::after { box-sizing: border-box; }
    .portal {
      --p-gauge-track: rgba(127, 127, 127, 0.16);
      --p-line: var(--border);
      --p-good: var(--info);
      --p-warn: var(--warning);
      --p-crit: var(--destructive);
      max-width: 34rem;
      margin: 0 auto;
      padding: clamp(1.75rem, 4vw, 3.25rem) 1.25rem 4rem;
    }

    /* Masthead — quiet, lets the ledger carry the personality. */
    .p-top {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding-bottom: 1.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--p-line);
    }
    .p-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      font-size: 1.05rem;
      color: var(--primary-foreground);
      background: var(--primary);
      border-radius: var(--radius-md);
    }
    .p-wordmark {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .p-wordmark b {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.015em;
    }
    .p-wordmark span {
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .p-top-actions {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .p-seg {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .p-seg button {
      font: inherit;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 0.3rem 0.55rem;
      border: 0;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }
    .p-seg button + button { border-left: 1px solid var(--border); }
    .p-seg button:hover { color: var(--foreground); background: var(--accent); }
    .p-seg button.active { background: var(--foreground); color: var(--background); }
    .p-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2rem;
      height: 2rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }
    .p-icon-btn:hover { background: var(--accent); color: var(--foreground); }
    .p-icon-btn .t-sys, .p-icon-btn .t-light, .p-icon-btn .t-dark { display: none; }
    .portal[data-theme="system"] .t-sys,
    .portal[data-theme="light"] .t-light,
    .portal[data-theme="dark"] .t-dark { display: inline-flex; }

    /* Check panel */
    .p-check-title {
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .p-check-hint {
      font-size: 0.8125rem;
      color: var(--muted-foreground);
      line-height: 1.55;
      margin: 0 0 1rem;
    }
    .p-key-row { display: flex; gap: 0.5rem; align-items: stretch; }
    .p-key-row .btn { flex: 0 0 auto; }
    .p-key-field { position: relative; flex: 1; min-width: 0; }
    .p-key-field .p-eye {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1.75rem;
      height: 1.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .p-key-field .p-eye:hover { color: var(--foreground); }
    .p-key-field input {
      padding-right: 2.5rem !important;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
    }

    /* ---- Receipt (result) ---- */
    .p-receipt {
      margin-top: 1.5rem;
      border: 1px solid var(--p-line);
      border-radius: var(--radius-lg);
      background: var(--card);
      overflow: hidden;
    }
    /* Perforated top edge — the signature "torn receipt" detail. */
    .p-perf {
      height: 10px;
      background:
        radial-gradient(circle at 6px 10px, transparent 5px, var(--card) 5px) repeat-x;
      background-size: 12px 10px;
      border-bottom: 1px dashed var(--p-line);
    }
    .p-receipt-body { padding: 1.25rem 1.25rem 1.5rem; }

    .p-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .p-status-row h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin: 0;
    }
    .p-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .p-pill::before {
      content: "";
      width: 0.4rem;
      height: 0.4rem;
      border-radius: 999px;
      background: currentColor;
    }
    .p-pill.ok { background: color-mix(in oklab, var(--success) 16%, transparent); color: var(--success); }
    .p-pill.bad { background: color-mix(in oklab, var(--destructive) 16%, transparent); color: var(--destructive); }

    /* Hero — remaining balance */
    .p-hero {
      margin: 1.1rem 0 0.35rem;
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .p-hero .p-hero-num {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 8vw, 2.75rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .p-hero .p-hero-unit {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted-foreground);
      padding-bottom: 0.2rem;
    }
    .p-hero-label {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
    }

    /* Gauges */
    .p-gauges { display: grid; gap: 1rem; margin-top: 0.5rem; }
    .p-gauge-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.5rem;
      font-size: 0.8125rem;
      margin-bottom: 0.4rem;
    }
    .p-gauge-head .lbl { color: var(--muted-foreground); font-weight: 500; }
    .p-gauge-head .val { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 500; }
    .p-gauge {
      position: relative;
      height: 0.55rem;
      background: var(--p-gauge-track);
      border-radius: 999px;
      overflow: hidden;
    }
    .p-gauge > i {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }
    /* Threshold ticks at 80% / 95% — reads the color logic back onto the track. */
    .p-gauge::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(var(--p-line), var(--p-line)) 80% 0 / 1px 100% no-repeat,
        linear-gradient(var(--p-line), var(--p-line)) 95% 0 / 1px 100% no-repeat;
      opacity: 0.5;
    }
    .p-gauge-unlimited {
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--muted-foreground);
    }

    /* Meta rows — receipt-style dotted leaders */
    .p-meta { margin-top: 1.25rem; display: grid; gap: 0.45rem; }
    .p-meta-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      font-size: 0.8125rem;
    }
    .p-meta-row .k { color: var(--muted-foreground); white-space: nowrap; }
    .p-meta-row .dots {
      flex: 1;
      border-bottom: 1px dotted var(--p-line);
      transform: translateY(-0.2rem);
      min-width: 1.5rem;
    }
    .p-meta-row .v {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      white-space: nowrap;
    }

    /* ---- Ledger (usage log) — the signature element ---- */
    .p-ledger { margin-top: 1.5rem; }
    .p-ledger-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--p-line);
      margin-bottom: 0.5rem;
    }
    .p-ledger-head h3 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin: 0;
    }
    .p-ledger-refresh {
      font: inherit;
      font-size: 0.75rem;
      color: var(--muted-foreground);
      background: transparent;
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .p-ledger-refresh:hover { color: var(--foreground); }
    .p-ledger-scroll {
      max-height: 20rem;
      overflow-y: auto;
      margin: 0 -0.25rem;
    }
    .p-ledger-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
    }
    .p-ledger-table th {
      position: sticky;
      top: 0;
      background: var(--card);
      text-align: left;
      font-weight: 500;
      color: var(--muted-foreground);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 0.6875rem;
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid var(--p-line);
    }
    .p-ledger-table th.num, .p-ledger-table td.num { text-align: right; }
    .p-ledger-table td {
      padding: 0.4rem 0.5rem;
      border-bottom: 1px dotted var(--p-line);
      color: var(--foreground);
      white-space: nowrap;
    }
    .p-ledger-table td.time { color: var(--muted-foreground); }
    .p-ledger-table td.model {
      max-width: 9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .p-ledger-table td.credits { font-weight: 600; }
    .p-ledger-table tbody tr:hover td { background: rgba(127, 127, 127, 0.06); }
    .p-ledger-empty {
      padding: 1.5rem 0.5rem;
      text-align: center;
      color: var(--muted-foreground);
      font-size: 0.8125rem;
    }
    .p-ledger-foot {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.55rem 0.5rem 0;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
    }
    .p-ledger-foot .k { color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.04em; }
    .p-ledger-foot .dots { flex: 1; border-bottom: 1px dotted var(--p-line); transform: translateY(-0.2rem); }
    .p-ledger-foot .v { font-weight: 600; }

    /* ---- Connect block — how the customer points their client here ---- */
    .p-connect {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--p-line);
    }
    .p-connect-head {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin: 0 0 0.75rem;
    }
    .p-conn-row {
      display: grid;
      grid-template-columns: minmax(4.5rem, auto) 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px dotted var(--p-line);
    }
    .p-conn-row .k {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      white-space: nowrap;
    }
    .p-conn-row .v {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .p-copy {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.75rem;
      height: 1.75rem;
      flex: 0 0 auto;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--muted-foreground);
      cursor: pointer;
      font-size: 0.75rem;
      transition: background-color 0.15s, color 0.15s;
    }
    .p-copy:hover { background: var(--accent); color: var(--foreground); }
    .p-copy.done { color: var(--success); border-color: color-mix(in oklab, var(--success) 45%, var(--border)); }
    .p-snippet {
      position: relative;
      margin-top: 0.85rem;
    }
    .p-snippet pre {
      margin: 0;
      padding: 0.75rem 2.5rem 0.75rem 0.75rem;
      background: var(--muted);
      border: 1px solid var(--p-line);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      line-height: 1.6;
      color: var(--foreground);
      overflow-x: auto;
      white-space: pre;
    }
    .p-snippet .p-copy {
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
      background: var(--card);
    }

    .p-foot {
      margin-top: 1.75rem;
      text-align: center;
      font-size: 0.6875rem;
      color: var(--muted-foreground);
      letter-spacing: 0.02em;
    }

    @media (prefers-reduced-motion: reduce) {
      .p-gauge > i { transition: none; }
    }
  </style>
</head>

<body>
  <div class="portal" id="portal" data-theme="system">
    <div class="p-top">
      <span class="p-mark"><i class="fa-solid fa-ghost"></i></span>
      <span class="p-wordmark">
        <b>Kiro-Go</b>
        <span data-t="brandTag"></span>
      </span>
      <div class="p-top-actions">
        <div class="p-seg" id="langBtns">
          <button data-lang="vi">VI</button>
          <button data-lang="en">EN</button>
        </div>
        <button class="p-icon-btn" id="themeBtn" type="button" aria-label="theme">
          <i class="fa-solid fa-circle-half-stroke t-sys"></i>
          <i class="fa-solid fa-sun t-light"></i>
          <i class="fa-solid fa-moon t-dark"></i>
        </button>
      </div>
    </div>

    <div>
      <h1 class="p-check-title" data-t="title"></h1>
      <p class="p-check-hint" data-t="hint"></p>
      <div class="p-key-row">
        <div class="p-key-field">
          <input type="password" id="keyInput" autocomplete="off" spellcheck="false" data-t-ph="keyPlaceholder" />
          <button class="p-eye" id="toggleKeyBtn" type="button" aria-label="show">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <button class="btn btn-primary" id="checkBtn" type="button">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span data-t="check"></span>
        </button>
      </div>
    </div>

    <div class="p-receipt" id="resultCard" style="display:none;">
      <div class="p-perf"></div>
      <div class="p-receipt-body">
        <div class="p-status-row">
          <h2 data-t="usageTitle"></h2>
          <span class="p-pill" id="statusPill"></span>
        </div>

        <div class="p-hero">
          <span class="p-hero-num" id="heroNum">—</span>
          <span class="p-hero-unit" id="heroUnit"></span>
        </div>
        <div class="p-hero-label" id="heroLabel"></div>

        <div class="p-gauges">
          <div>
            <div class="p-gauge-head">
              <span class="lbl" id="tokensLabel"></span>
              <span class="val" id="tokensVal"></span>
            </div>
            <div class="p-gauge" id="tokensGaugeWrap" style="display:none;"><i id="tokensGauge"></i></div>
          </div>
          <div>
            <div class="p-gauge-head">
              <span class="lbl" id="creditsLabel"></span>
              <span class="val" id="creditsVal"></span>
            </div>
            <div class="p-gauge" id="creditsGaugeWrap" style="display:none;"><i id="creditsGauge"></i></div>
          </div>
        </div>

        <div class="p-meta">
          <div class="p-meta-row">
            <span class="k" data-t="requests"></span>
            <span class="dots"></span>
            <span class="v" id="reqVal"></span>
          </div>
          <div class="p-meta-row" id="dailyRow" style="display:none;">
            <span class="k" data-t="dailyTokens"></span>
            <span class="dots"></span>
            <span class="v" id="dailyVal"></span>
          </div>
          <div class="p-meta-row" id="expiryRow" style="display:none;">
            <span class="k" data-t="expiry"></span>
            <span class="dots"></span>
            <span class="v" id="expiryVal"></span>
          </div>
        </div>

        <div class="p-ledger" id="byModelBlock" style="display:none;">
          <div class="p-ledger-head">
            <h3 data-t="byModelTitle"></h3>
          </div>
          <div class="p-ledger-scroll">
            <table class="p-ledger-table">
              <thead>
                <tr>
                  <th data-t="colModel"></th>
                  <th class="num" data-t="colReqs"></th>
                  <th class="num" data-t="colIn"></th>
                  <th class="num" data-t="colOut"></th>
                </tr>
              </thead>
              <tbody id="byModelBody"></tbody>
            </table>
          </div>
        </div>

        <div class="p-ledger">
          <div class="p-ledger-head">
            <h3 data-t="ledgerTitle"></h3>
            <button class="p-ledger-refresh" id="ledgerRefresh" type="button">
              <i class="fa-solid fa-rotate"></i><span data-t="refresh"></span>
            </button>
          </div>
          <div class="p-ledger-scroll">
            <table class="p-ledger-table">
              <thead>
                <tr>
                  <th data-t="colTime"></th>
                  <th data-t="colModel"></th>
                  <th class="num" data-t="colTokens"></th>
                  <th class="num" data-t="colCredits"></th>
                </tr>
              </thead>
              <tbody id="ledgerBody"></tbody>
            </table>
            <div class="p-ledger-empty" id="ledgerEmpty" style="display:none;"></div>
          </div>
          <div class="p-ledger-foot" id="ledgerFoot" style="display:none;">
            <span class="k" data-t="ledgerTotal"></span>
            <span class="dots"></span>
            <span class="v" id="ledgerFootVal"></span>
          </div>
        </div>

        <div class="p-connect" id="connectBlock" style="display:none;">
          <h3 class="p-connect-head" data-t="connectTitle"></h3>
          <div class="p-conn-row">
            <span class="k" data-t="connBaseUrl"></span>
            <span class="v" id="connBaseUrl"></span>
            <button class="p-copy" type="button" data-copy-target="connBaseUrl" aria-label="copy">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
          <div class="p-conn-row">
            <span class="k" data-t="connClaude"></span>
            <span class="v" id="connClaudeUrl"></span>
            <button class="p-copy" type="button" data-copy-target="connClaudeUrl" aria-label="copy">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
          <div class="p-conn-row">
            <span class="k" data-t="connOpenai"></span>
            <span class="v" id="connOpenaiUrl"></span>
            <button class="p-copy" type="button" data-copy-target="connOpenaiUrl" aria-label="copy">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
          <div class="p-snippet">
            <pre id="connSnippet"></pre>
            <button class="p-copy" type="button" data-copy-target="connSnippet" aria-label="copy">
              <i class="fa-regular fa-copy"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="p-foot" data-t="footerNote"></div>
  </div>

  <script>
    (function () {
      var I18N = {
        vi: {
          brandTag: 'Cổng khách hàng',
          title: 'Kiểm tra API Key',
          hint: 'Nhập API key của bạn để xem số dư còn lại và nhật ký sử dụng. Trang này không cần mật khẩu quản trị.',
          keyPlaceholder: 'sk-...',
          check: 'Kiểm tra',
          usageTitle: 'Tình trạng sử dụng',
          tokens: 'Tokens',

          keyPlaceholder: 'sk-...',

          notFound: 'Invalid API key',

      var $ = function (id) { return document.getElementById(id); };
      var portal = $('portal');

      var lang = (localStorage.getItem('kiro_lang') === 'en') ? 'en' : 'vi';
      function t(k) { return (I18N[lang] && I18N[lang][k]) || I18N.vi[k] || k; }

      function applyLang() {
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-t]').forEach(function (el) {
          el.textContent = t(el.getAttribute('data-t'));
        });
        document.querySelectorAll('[data-t-ph]').forEach(function (el) {
          el.setAttribute('placeholder', t(el.getAttribute('data-t-ph')));
        });
        document.querySelectorAll('#langBtns button').forEach(function (b) {
          b.classList.toggle('active', b.dataset.lang === lang);
        });
        if (lastData) renderResult(lastData);
        if (lastLogs) renderLedger(lastLogs);
      }

      // ---- Theme (system / light / dark) ----
      var THEMES = ['system', 'light', 'dark'];
      var themeMQ = window.matchMedia('(prefers-color-scheme: dark)');
      function getThemePref() {
        var s = localStorage.getItem('kiro_theme');
        return THEMES.indexOf(s) >= 0 ? s : 'system';
      }
      function applyTheme(pref) {
        var dark = pref === 'dark' || (pref === 'system' && themeMQ.matches);
        document.documentElement.classList.toggle('dark', dark);
        portal.dataset.theme = pref;
      }
      themeMQ.addEventListener('change', function () {
        if (getThemePref() === 'system') applyTheme('system');
      });
      $('themeBtn').addEventListener('click', function () {
        var next = THEMES[(THEMES.indexOf(getThemePref()) + 1) % THEMES.length];
        localStorage.setItem('kiro_theme', next);
        applyTheme(next);
      });

      // ---- Formatting ----
      function fmtNum(n) {
        if (n == null || isNaN(n)) return '0';
        if (Math.abs(n) >= 1 && Math.floor(n) === n) return Number(n).toLocaleString('en-US');
        return Number(n).toLocaleString('en-US', { maximumFractionDigits: 4 });
      }
      function fmtDate(unixSec) {
        if (!unixSec) return '';
        var d = new Date(unixSec * 1000);
        var pad = function (x) { return String(x).padStart(2, '0'); };
        return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
          ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      function fmtTime(unixSec) {
        if (!unixSec) return '';
        var d = new Date(unixSec * 1000);
        var pad = function (x) { return String(x).padStart(2, '0'); };
        return pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      function gaugeColor(ratio) {
        if (ratio >= 0.95) return 'var(--p-crit)';
        if (ratio >= 0.8) return 'var(--p-warn)';
        return 'var(--p-good)';
      }

      var lastData = null;
      var lastLogs = null;

      function setGauge(headVal, wrap, fill, used, limit) {
        if (!limit || limit <= 0) {
          headVal.textContent = fmtNum(used) + ' · ' + t('unlimited');
          wrap.style.display = 'none';
          return;
        }
        var ratio = Math.max(0, Math.min(1, used / limit));
        headVal.textContent = fmtNum(used) + ' / ' + fmtNum(limit);
        wrap.style.display = 'block';
        fill.style.width = (ratio * 100).toFixed(1) + '%';
        fill.style.background = gaugeColor(ratio);
      }

      function renderResult(d) {
        lastData = d;
        $('resultCard').style.display = '';

        var pill = $('statusPill');
        if (d.valid) {
          pill.className = 'p-pill ok';
          pill.textContent = t('valid');
        } else {
          pill.className = 'p-pill bad';
          var reason = t('invalid');
          if (!d.enabled) reason = t('disabled');
          else if (d.expired) reason = t('expired');
          else if (d.overToken || d.overCredit) reason = t('overLimit');
          pill.textContent = reason;
        }

        // Hero: prefer remaining credits; fall back to tokens; else unlimited.
        var heroNum = $('heroNum'), heroUnit = $('heroUnit'), heroLabel = $('heroLabel');
        if (d.creditLimit && d.creditLimit > 0) {
          heroNum.textContent = fmtNum(Math.max(0, (d.creditLimit - (d.creditsUsed || 0))));
          heroUnit.textContent = t('credits');
          heroLabel.textContent = t('remainCredits');
        } else if (d.tokenLimit && d.tokenLimit > 0) {
          heroNum.textContent = fmtNum(Math.max(0, (d.tokenLimit - (d.tokensUsed || 0))));
          heroUnit.textContent = t('tokens');
          heroLabel.textContent = t('remainTokens');
        } else {
          heroNum.textContent = '∞';
          heroUnit.textContent = '';
          heroLabel.textContent = t('unlimitedShort');
        }

        $('tokensLabel').textContent = t('tokens');
        $('creditsLabel').textContent = t('credits');
        setGauge($('tokensVal'), $('tokensGaugeWrap'), $('tokensGauge'), d.tokensUsed || 0, d.tokenLimit || 0);
        setGauge($('creditsVal'), $('creditsGaugeWrap'), $('creditsGauge'), d.creditsUsed || 0, d.creditLimit || 0);

        $('reqVal').textContent = fmtNum(d.requestsCount || 0);
        if (d.expiresAt) {
          $('expiryRow').style.display = '';
          $('expiryVal').textContent = fmtDate(d.expiresAt);
        } else {
          $('expiryRow').style.display = 'none';
        }

        // Daily tokens + per-model breakdown (in-memory, resets on server restart).
        if (d.dailyTokens != null) {
          $('dailyRow').style.display = '';
          $('dailyVal').textContent = fmtNum(d.dailyTokens || 0);
        } else {
          $('dailyRow').style.display = 'none';
        }
        renderByModel(d.byModel);

        renderConnect(d);
      }

      // How-to-connect block: shows the customer where to point their client.
      // Only meaningful for a usable key, so it's hidden otherwise.
      function renderConnect(d) {
        var block = $('connectBlock');
        var base = (d.baseURL || '').replace(/\/+$/, '');
        if (!d.valid || !base) { block.style.display = 'none'; return; }
        block.style.display = '';
        $('connectBlock').querySelector('.p-connect-head').textContent = t('connectTitle');
        $('connBaseUrl').textContent = base;
        $('connClaudeUrl').textContent = base + '/v1/messages';
        $('connOpenaiUrl').textContent = base + '/v1/chat/completions';
        var key = currentKey() || 'sk-...';
        $('connSnippet').textContent =
          'curl ' + base + '/v1/chat/completions \\\n' +
          '  -H "Authorization: Bearer ' + key + '" \\\n' +
          '  -H "Content-Type: application/json" \\\n' +
          '  -d \'{"model":"claude-sonnet-4","messages":[{"role":"user","content":"Hi"}]}\'';
      }

      function renderByModel(list) {
        var block = $('byModelBlock');
        var body = $('byModelBody');
        if (!Array.isArray(list) || !list.length) {
          block.style.display = 'none';
          body.innerHTML = '';
          return;
        }
        block.style.display = '';
        body.innerHTML = list.map(function (m) {
          return '<tr>' +
            '<td class="model" title="' + escapeAttr(m.model || '') + '">' + escapeHtml(m.model || '—') + '</td>' +
            '<td class="num">' + fmtNum(m.requests || 0) + '</td>' +
            '<td class="num">' + fmtNum(m.inputTok || 0) + '</td>' +
            '<td class="num">' + fmtNum(m.outputTok || 0) + '</td>' +
            '</tr>';
        }).join('');
      }

      function renderLedger(logs) {
        lastLogs = logs;
        var body = $('ledgerBody');
        var empty = $('ledgerEmpty');
        var foot = $('ledgerFoot');
        if (!logs || !logs.length) {
          body.innerHTML = '';
          empty.textContent = t('ledgerEmpty');
          empty.style.display = '';
          foot.style.display = 'none';
          return;
        }
        empty.style.display = 'none';
        var totalCredits = 0;
        var rows = logs.map(function (e) {
          totalCredits += (e.credits || 0);
          return '<tr>' +
            '<td class="time">' + fmtTime(e.time) + '</td>' +
            '<td class="model" title="' + escapeAttr(e.model || '') + '">' + escapeHtml(e.model || '—') + '</td>' +
            '<td class="num">' + fmtNum(e.totalTokens || 0) + '</td>' +
            '<td class="num credits">' + fmtNum(e.credits || 0) + '</td>' +
            '</tr>';
        }).join('');
        body.innerHTML = rows;
        foot.style.display = '';
        $('ledgerFootVal').textContent = fmtNum(totalCredits);
      }

      function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s == null ? '' : String(s);
        return d.innerHTML;
      }

      // escapeAttr is for values placed inside a double-quoted HTML attribute.
      // escapeHtml (textContent) does NOT escape quotes, so a value with a `"`
      // could break out of a title="..." attribute; escape quotes explicitly.
      function escapeAttr(s) {
        return escapeHtml(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function flash(msg) {
        var btn = $('checkBtn');
        var span = btn.querySelector('span');
        var old = span.textContent;
        span.textContent = msg;
        setTimeout(function () { span.textContent = old; }, 1800);
      }

      function currentKey() { return $('keyInput').value.trim(); }

      async function fetchLedger() {
        var key = currentKey();
        if (!key) return;
        try {
          var res = await fetch('/v1/key/logs?limit=100', {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + key }
          });
          if (!res.ok) { renderLedger([]); return; }
          var d = await res.json();
          renderLedger(Array.isArray(d.logs) ? d.logs : []);
        } catch (e) {
          renderLedger([]);
        }
      }

      async function check() {
        var key = currentKey();
        if (!key) { flash(t('keyRequired')); return; }
        var btn = $('checkBtn');
        btn.disabled = true;
        try {
          var res = await fetch('/v1/key/info', {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + key }
          });
          if (res.status === 401) { flash(t('notFound')); return; }
          if (!res.ok) { flash(t('failed')); return; }
          var d = await res.json();
          renderResult(d);
          fetchLedger();
        } catch (e) {
          flash(t('failed'));
        } finally {
          btn.disabled = false;
        }
      }

      // ---- Wiring ----
      $('checkBtn').addEventListener('click', check);
      $('keyInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') check(); });
      $('ledgerRefresh').addEventListener('click', fetchLedger);
      $('toggleKeyBtn').addEventListener('click', function () {
        var f = $('keyInput');
        var show = f.type === 'password';
        f.type = show ? 'text' : 'password';
        this.innerHTML = show ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
      });
      $('langBtns').addEventListener('click', function (e) {
        var b = e.target.closest('button');
        if (!b) return;
        lang = b.dataset.lang;
        localStorage.setItem('kiro_lang', lang);
        applyLang();
      });

      // Copy buttons (connect block): copy the target element's text, flash confirmation.
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.p-copy');
        if (!btn) return;
        var target = $(btn.getAttribute('data-copy-target'));
        if (!target) return;
        var text = target.textContent || '';
        var done = function () {
          btn.classList.add('done');
          setTimeout(function () { btn.classList.remove('done'); }, 1400);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done, done);
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (err) { }
          document.body.removeChild(ta);
          done();
        }
      });

      applyTheme(getThemePref());
      applyLang();
    })();
  </script>

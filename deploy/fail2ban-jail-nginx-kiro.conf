# /etc/fail2ban/jail.d/nginx-kiro.conf
# IP nao dinh 429 (rate-limit) >= 10 lan trong 60s -> ban 1 gio o iptables.
[nginx-kiro]
enabled  = true
filter   = nginx-kiro
logpath  = /var/log/nginx/error.log
maxretry = 10
findtime = 60
bantime  = 3600
action   = iptables-multiport[name=kiro, port="443", protocol=tcp]

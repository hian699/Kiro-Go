# /etc/nginx/conf.d/kiro.conf
# Lop 2 — Nginx dat truoc Go. Kien truc:
#   Internet -> Cloudflare -> Nginx (VPS:443) -> Go (127.0.0.1:8090)
#
# QUAN TRONG: sau khi bat Nginx, PHAI set KIRO_TRUST_PROXY=true trong docker-compose.yml
# va doi cong Go ve 127.0.0.1:8090:8080 (chi loopback). Neu khong, Go thay moi request
# den tu 127.0.0.1 -> gioi han per-IP cua dos_guard vo dung.

# === Lay IP that do Cloudflare gui qua CF-Connecting-IP ===
map $http_cf_connecting_ip $real_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;            # fallback neu request khong qua Cloudflare
}

# === Rate-limit zones (http context) ===
# 10 req/giay moi IP, vung nho 10MB (~160k IP)
limit_req_zone  $real_client_ip zone=apireq:10m rate=10r/s;
# Toi da 20 connection dong thoi moi IP
limit_conn_zone $real_client_ip zone=apiconn:10m;

# Tra ve 429 thay vi 503 mac dinh khi vuot limit
limit_req_status  429;
limit_conn_status 429;

server {
    listen 443 ssl http2;
    server_name api.your-domain.com;     # <-- doi thanh domain that

    # certbot tu dien ssl_certificate / ssl_certificate_key khi chay:
    #   sudo certbot --nginx -d api.your-domain.com

    # Lay IP that cho $remote_addr / log (de fail2ban ban dung IP).
    # Chi tin CF-Connecting-IP tu dai IP Cloudflare; liet ke chat hon neu muon.
    set_real_ip_from 0.0.0.0/0;
    real_ip_header CF-Connecting-IP;

    # Chan body qua lon ngay tai Nginx (khop voi KIRO_MAX_BODY_BYTES = 10 MiB)
    client_max_body_size 10m;

    # Chong slowloris: timeout doc header/body
    client_header_timeout 15s;
    client_body_timeout   30s;
    send_timeout          60s;

    location / {
        # burst=20: cho phep don ngan roi moi gioi han; nodelay: khong xep hang cho
        limit_req  zone=apireq burst=20 nodelay;
        limit_conn apiconn 20;

        proxy_pass http://127.0.0.1:8090;    # cong Go (docker-compose map 8090:8080)
        proxy_http_version 1.1;

        # Chuyen IP that xuong Go de dos_guard tinh per-IP dung
        proxy_set_header X-Real-IP        $real_client_ip;
        proxy_set_header X-Forwarded-For  $real_client_ip;
        proxy_set_header Host             $host;

        # SSE streaming: KHONG buffer, giu ket noi dai cho token stream
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}

# Reference nginx config fronting Kiro-Go. Tune zones/rates to your traffic.
# Assumes Cloudflare in front (real client IP arrives in CF-Connecting-IP).

# --- Trust Cloudflare edge IPs so real_ip resolves the true client. ---
# Keep this list current: https://www.cloudflare.com/ips/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 172.64.0.0/13;
# ... (add the remaining published Cloudflare ranges) ...
real_ip_header CF-Connecting-IP;

# --- Rate + connection limit zones (keyed on the real client IP). ---
limit_req_zone  $binary_remote_addr zone=kiro_rpm:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=kiro_conn:10m;

server {
    listen 80;
    server_name _;

    location / {
        # ~60 req/min per IP with a small burst; 429 on excess.
        limit_req  zone=kiro_rpm burst=20 nodelay;
        limit_req_status 429;
        # Max concurrent connections per IP.
        limit_conn kiro_conn 10;
        limit_conn_status 429;

        proxy_pass http://kiro-go:8080;
        proxy_http_version 1.1;

        # Forward the real client IP so the app-layer guard keys correctly.
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header Host             $host;

        # Do not buffer SSE streams.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
